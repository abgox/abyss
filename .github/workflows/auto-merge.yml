name: Auto Merge PR

on:
  pull_request:
    types: [labeled, opened]

concurrency:
  group: manifest-update-lock

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'auto-merge') || (github.event.pull_request.user.login == 'github-actions[bot]' && endsWith(github.event.pull_request.title, 'Fix Hash'))
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5

      - name: Merge PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: "squash"
            });
