name: Issues

on:
  issues:
    types: [opened]

jobs:
  issue-handler:
    name: Issue Handler
    runs-on: windows-latest
    if: "${{ !contains(github.event.issue.title, '[Bug]') && !contains(github.event.issue.title, '[Request]') && contains(github.event.issue.title, '.') && contains(github.event.issue.title, ': ') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch}}

      - name: Issue Handler
        # uses: ScoopInstaller/GithubActions@main
        uses: abgox/ScoopInstaller-GithubActions@abyss
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-repos:
    name: Sync Repos
    needs: issue-handler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Compare Hash
        id: compare
        run: |
          INITIAL_HASH="${{ github.sha }}"
          CURRENT_HASH=$(git rev-parse HEAD)
          echo "Initial: $INITIAL_HASH"
          echo "Current: $CURRENT_HASH"
          if [ "$CURRENT_HASH" = "$INITIAL_HASH" ]; then
            echo "sync=false" >> $GITHUB_OUTPUT
          else
            echo "sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync Repos
        if: steps.compare.outputs.sync == 'true'
        uses: abgox/hub-mirror-action@abgox
        continue-on-error: true
        with:
          src: github/abgox
          dst: gitee/abgox
          dst_key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          dst_token: ""
          force_update: true
          static_list: ${{ github.event.repository.name }}
