name: Issues

on:
  issues:
    types: [opened]

jobs:
  issue-handler:
    name: Issue Handler
    runs-on: windows-latest
    if: "${{ !contains(github.event.issue.title, '[Bug]') && !contains(github.event.issue.title, '[Request]') && contains(github.event.issue.title, '.') && contains(github.event.issue.title, ': ') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch}}

      - name: Issue Handler
        # uses: ScoopInstaller/GithubActions@main
        uses: abgox/ScoopInstaller-GithubActions@abyss
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-repos:
    name: Sync Repos
    needs: issue-handler
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.issue.title, ': hash check failed') }}"
    steps:
      - name: Sync Repos
        uses: abgox/hub-mirror-action@abgox
        continue-on-error: true
        with:
          src: github/abgox
          dst: gitee/abgox
          dst_key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          dst_token: ""
          force_update: true
          static_list: ${{ github.event.repository.name }}
