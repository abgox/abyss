name: Issues

on:
  issues:
    types: [opened]

# concurrency:
#   group: manifest-update-lock

jobs:
  issue-handler:
    name: Issue Handler
    runs-on: windows-latest
    if: ${{ !contains(github.event.issue.title, '[Bug]') && !contains(github.event.issue.title, '[Request]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch}}

      - name: Issue Handler
        # uses: ScoopInstaller/GithubActions@main
        uses: abgox/ScoopInstaller-GithubActions@abyss
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-repos:
    name: Sync Repos
    needs: issue-handler
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.issue.labels.*.name, ','), 'hash-fix-needed') &&
      contains(join(github.event.issue.labels.*.name, ','), 'verified')
    continue-on-error: true
    steps:
      - uses: abgox/hub-mirror-action@abgox
        with:
          src: github/abgox
          dst: gitee/abgox
          dst_key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          dst_token: ""
          force_update: true
          static_list: ${{ github.event.repository.name }}
