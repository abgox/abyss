name: Check Manifest

on:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created] # /check

concurrency:
  group: check-manifest-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check:
    name: Check Manifest
    runs-on: windows-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/check') &&
        (
          github.event.comment.user.login == github.event.issue.user.login ||
          contains(
            fromJson('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'),
            github.event.comment.author_association
          )
        )
      )
    env:
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
      MARKER: "<!-- comment-by-bot-for-check-manifest -->"
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Find or create comment
        id: comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request?.number || context.payload.issue?.number
            const marker = process.env.MARKER
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 100
            })

            let comment = comments.data.find(c => c.body && c.body.includes(marker))

            const body = `${marker}

            ⏳ Checking...
            `

            if (comment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                body
              })
              core.setOutput("comment_id", comment.id)
            } else {
              const res = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body
              })
              core.setOutput("comment_id", res.data.id)
            }

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch}}
          fetch-depth: 1

      - name: Check Manifest
        shell: pwsh
        run: .\script\check-manifest.ps1

      - name: Comment PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('result.md', 'utf8');
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.comment.outputs.comment_id }},
              body: body
            });

      - name: Check rate limit
        shell: pwsh
        run: |
          # Check rate limit
          $headers = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept        = 'application/vnd.github.v3+json'
          }
          try {
              $response = Invoke-RestMethod -Uri 'https://api.github.com/rate_limit' -Headers $headers
              Write-Output $response.rate
          }
          catch {
              Write-Output 'Failed to check rate limit'
          }
