name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sort-json:
    name: Sort JSON and Push
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch}}
          fetch-depth: 50

      - name: Sort JSON and Push
        shell: pwsh
        run: |
          $manual = "${{ github.event_name }}" -eq "workflow_dispatch"
          .\script\sort-json.ps1 -All:$manual
          .\script\push-change.ps1 -message "(chore): automatically sort json [skip ci]"

  sync-repos:
    name: Sync Repos
    needs: sort-json
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: abgox/hub-mirror-action@abgox
        with:
          src: github/abgox
          dst: gitee/abgox
          dst_key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          dst_token: ""
          force_update: true
          static_list: ${{ github.event.repository.name }}

  update-docs:
    name: Update Docs
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch}}

      - name: Update Docs
        shell: pwsh
        run: |
          git clone --depth 1 https://${{ secrets.PAT_TOKEN }}@github.com/abgox/abyss-docs.git
          cd abyss-docs
          .\scripts\generate-list.ps1
          .\scripts\push-change.ps1
