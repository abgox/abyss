name: Sort JSON Files

on:
  workflow_dispatch:
  push:
    branches:
      - main

# concurrency:
#   group: manifest-update-lock

permissions:
  contents: write

jobs:
  push-changes:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch}}
          fetch-depth: 50

      - name: Sort JSON Files
        shell: pwsh
        run: |
          git clone --depth 1 --branch abyss https://github.com/abgox/ScoopInstaller-Scoop
          $env:SCOOP_HOME = ".\ScoopInstaller-Scoop"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              .\script\sort-json.ps1
          } else {
              .\script\sort-json.ps1 -Recent
          }

      - name: Commit changes if any
        id: changes
        shell: pwsh
        run: |
          .\script\push-change.ps1 -message "(chore): automatically sort json files [skip ci]"
